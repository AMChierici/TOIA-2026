# =============================================================================
# TOIA — self-hosted production stack.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires a fully populated .env (see .env.example): in particular
# SECRET_KEY_BASE, GUARDIAN_SECRET_KEY, DATABASE_URL, API_URL and OPENAI_API_KEY.
# For managed platforms (Railway/Render) see docs/deploy-railway.md instead.
# =============================================================================
services:
  mysql:
    image: mysql:8.0.33
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MIX_ENV: prod
      PHX_SERVER: "true"
    env_file:
      - ./.env
    ports:
      - "4000:4000"
    volumes:
      - api_media:/app/Accounts

  q_api:
    build: ./backend/q_api
    # See docker-compose.yml: amd64 wheels for the old pinned deps.
    platform: linux/amd64
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env

  toia-dm:
    build: ./backend/toia-dm
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DM_PORT=5001
    env_file:
      - ./.env

volumes:
  mysql_data:
  api_media:
