# =============================================================================
# TOIA — local development stack.
#
#   1. cp .env.example .env   (set OPENAI_API_KEY and DB_PASSWORD)
#   2. docker compose up
#   3. open http://localhost:4000
#
# The `api` service (Phoenix) serves both the API and the compiled React app.
# Recorded media and the database persist in named volumes.
# =============================================================================
services:
  mysql:
    image: mysql:8.0.33
    command: --default-authentication-plugin=mysql_native_password
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  # Optional DB admin UI at http://localhost:8080
  phpmyadmin:
    image: phpmyadmin:5.2
    restart: on-failure
    depends_on:
      - mysql
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      UPLOAD_LIMIT: 1024M

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MIX_ENV: dev
    env_file:
      - ./.env
    ports:
      - "4000:4000"
    volumes:
      - api_media:/app/Accounts
      # Hot code reload in development
      - ./backend/api/lib:/app/lib

  q_api:
    build: ./backend/q_api
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    ports:
      - "5000:5000"

  toia-dm:
    build: ./backend/toia-dm
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DM_PORT=5001
    env_file:
      - ./.env
    ports:
      - "5001:5001"

volumes:
  mysql_data:
  api_media:
